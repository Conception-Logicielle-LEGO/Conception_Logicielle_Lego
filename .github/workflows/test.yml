name: Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Tests avec pytest
    runs-on: ubuntu-22.04

    # 🗄️ Service PostgreSQL pour les tables utilisateur
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lego_users_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Configurer Python
      run: uv python install 3.13

    - name: Installer les dépendances
      run: uv sync --dev

    - name: Créer le schéma PostgreSQL pour les tests
      run: |
        PGPASSWORD=test psql -h localhost -U test -d lego_users_test -f app/database/postgres/schema_user.sql
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: lego_users_test
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test

    - name: Lancer les tests avec pytest
      run: uv run pytest test/ -v
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: lego_users_test
        POSTGRES_USER: test
        POSTGRES_PASSWORD: test
